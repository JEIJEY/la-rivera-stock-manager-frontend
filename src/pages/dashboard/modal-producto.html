<div class="modal-producto" id="modalProductoInventario">
  <div class="modal-contenido">
    <div class="modal-header">
      <h2>➕ Crear nuevo producto</h2>
      <button class="cerrar-modal" id="cerrarModalProducto">&times;</button>
    </div>

    <form id="formProducto" class="form-producto">
      <label for="nombre">Nombre del producto</label>
      <input type="text" id="nombre" name="nombre" placeholder="Ejemplo: Leche entera" required />

      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" name="descripcion" placeholder="Detalles del producto"></textarea>

      <label for="categoria">Categoría</label>
      <select id="categoria" name="categoria" required>
        <option value="">Seleccione una categoría</option>
      </select>

      <label for="marca">Marca</label>
      <select id="marca" name="marca">
        <option value="">Seleccione una marca</option>
      </select>

      <label for="proveedor">Proveedor</label>
      <select id="proveedor" name="proveedor">
        <option value="">Seleccione un proveedor</option>
      </select>

      <label for="stock">Stock inicial</label>
      <input type="number" id="stock" name="stock" min="0" placeholder="Ejemplo: 50" />

      <label for="unidad">Unidad de medida</label>
      <input type="text" id="unidad" name="unidad" placeholder="Ejemplo: unidades, litros, kg..." />

      <label for="precio">Precio unitario</label>
      <input type="number" id="precio" name="precio" step="0.01" min="0" placeholder="Ejemplo: 2500" />

      <label for="estado">Estado</label>
      <select id="estado" name="estado">
        <option value="1">🟢 Activo</option>
        <option value="0">🔴 Inactivo</option>
      </select>

      <div class="modal-acciones">
        <button type="button" class="btn btn--secondary" id="cancelarModal">Cancelar</button>
        <button type="submit" class="btn btn--primary">Guardar producto</button>
      </div>
    </form>
  </div>
</div>
