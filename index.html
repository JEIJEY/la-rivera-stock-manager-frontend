<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Rivera Stock Manager</title>
    <!-- Anti-FOFC: aplica el tema antes de renderizar -->
    <script>
      (function () {
        var t = localStorage.getItem("la-rivera-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
